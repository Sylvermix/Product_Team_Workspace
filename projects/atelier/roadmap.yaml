    success_metric: "internal team can build personal wardrobes of 20+ items without friction"

  - name: "Looks feature shippable"
    target_date: "2026-06-11"
    stories: ["US-020", "US-021"]
    status: "on_track"
    success_metric: "users can create and browse looks"

  - name: "Scan feature shippable"
    target_date: "2026-06-25"
    stories: ["US-010", "US-011"]
