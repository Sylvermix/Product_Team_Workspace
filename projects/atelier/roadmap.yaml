risks:
  - description: "SPIKE-001 fails: AI product match rate below threshold"
    impact: "fundamental pivot — either different value prop (manual tagging, curator-driven) or significant ML investment"
    mitigation: "define pass/fail criteria clearly before spike; if fails, do not proceed with US-010; reassess core hypothesis in week 3"
    owner: "tech"

  - description: "SPIKE-002 fails: APIs too restrictive / expensive"
    impact: "product catalog coverage limited; may need manual curation for MVP"
    mitigation: "have fallback list of 2-3 alternative sources; consider negotiating direct partnerships with 1-2 major retailers"
    owner: "lead"

  - description: "iOS App Store policy friction around shoppable content"
    impact: "submission rejected or enhanced review delays launch"
    mitigation: "review policies during design phase; build disclosure UX early; submit beta builds to TestFlight for early signal"
    owner: "lead"

  - description: "Inference cost per scan exceeds target ($0.02)"
    impact: "margin risk at scale; may need to cap free-tier scans or defer launch"
    mitigation: "measure cost during SPIKE-001; plan tiered architecture (cheap first-pass, expensive only on ambiguous cases)"
    owner: "tech"

capacity:
  avg_stories_per_sprint: 0  # no data yet
