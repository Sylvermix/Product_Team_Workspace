  # ─────────────────────────────────────────────────────────────
  # Epic 2: Scan — AI product identification
  # ─────────────────────────────────────────────────────────────
  - id: "US-010"
    epic: "scan"
    title: "Scan any photo to identify garments and find matching products"
    format: "As a user, I want to scan any photo (mine or from inspiration) so the app identifies the garments and shows me where to buy similar items"
    outcome: "scan feature used by 60%+ of MAU weekly; product tap-through rate ≥ 25%"
    score:
      impact: 5
      confidence: 3
      effort: 5
      total: 3.0
      reasoning: "highest impact AND highest risk — core differentiator. Confidence limited until feasibility spike completes"
    acceptance_criteria:
      functional:
        - "Scan button accessible from home, wardrobe, and any photo view"
        - "AI identifies distinct garments in the photo (top, bottom, shoes, accessories)"
        - "Visual overlay shows detected garments with subtle markers during analysis"
        - "For each detected garment, show 3-5 matching products with image, price, retailer, review score"
        - "Sort matches by price (ascending/descending)"
        - "Filter matches by retailer, price range"
        - "Tap a match → deep link to retailer (app or web)"
        - "Affiliate disclosure visible in results view"
      quality:
        - "Full scan (upload → first results visible) in < 6s on 4G"
        - "AI accuracy: top-3 results include a 'useful match' in ≥75% of scans (validated on test set)"
        - "Graceful 'no matches found' state with suggestion to try a clearer photo"
    definition_of_done:
      - "Feasibility spike passed (pre-requisite to committing)"
      - "Legal review of retailer API usage done"
      - "Affiliate networks integrated and disclosure UX approved"
    depends_on: []
    priority: "critical"

