# ─────────────────────────────────────────────────────────────
# READY — MVP Epic 1: Wardrobe core
# ─────────────────────────────────────────────────────────────
ready:
  - id: "US-001"
    epic: "wardrobe_core"
    title: "Add garment to wardrobe via camera"
    format: "As a new user, I want to take a photo of a garment I own so I can start building my digital wardrobe without typing"
    outcome: "90% of users add at least 3 garments in first session"
    score:
      impact: 5
      confidence: 5
      effort: 3
      total: 8.3
      reasoning: "core onboarding gesture, cannot have product without this"
    acceptance_criteria:
      functional:
        - "Camera button on wardrobe empty state and persistent FAB"
        - "Camera opens in < 800ms"
        - "Photo preview before save, with retake option"
        - "On save, photo uploads and AI auto-tags category, color, season"
        - "Item appears in wardrobe grid within 3s of save"
      quality:
        - "Works offline (queue upload for when connection returns)"
        - "Respects prefers-reduced-motion"
        - "Accessible: camera button has proper ARIA + haptic feedback"
    out_of_scope:
      - "Background removal (separate story)"
      - "Manual editing of AI tags (separate story US-004)"
    definition_of_done:
      - "All acceptance criteria pass"
      - "Tested on iOS 16+ and Android 10+"
      - "AI tagging accuracy validated at ≥75% on test set"
    depends_on: []
    priority: "critical"

  - id: "US-002"
    epic: "wardrobe_core"
    title: "Add garment to wardrobe via photo upload"
    format: "As a user, I want to upload existing photos from my camera roll so I can add clothes I've already photographed"
    outcome: "50%+ of wardrobe adds via upload (not camera) in first session"
    score:
      impact: 4
      confidence: 5
      effort: 2
      total: 10.0
      reasoning: "critical for onboarding cold start — users have photos already"
    acceptance_criteria:
      functional:
        - "Upload option alongside camera option"
        - "Multi-select up to 10 photos at once"
        - "Batch AI processing with progress indicator"
        - "Each photo becomes a separate wardrobe item"
      quality:
        - "Handles large photos (>10MB) via client-side resize before upload"
        - "Graceful error per-photo if one fails"
    depends_on: ["US-001"]
    priority: "critical"

  - id: "US-003"
    epic: "wardrobe_core"
    title: "View wardrobe as editable grid"
    format: "As a user, I want to see all my garments in a visual grid so I can quickly browse what I own"
    outcome: "median session length includes ≥1 wardrobe grid view"
    score:
      impact: 5
      confidence: 5
      effort: 3
      total: 8.3
      reasoning: "primary screen, must exist and perform well"
    acceptance_criteria:
      functional:
        - "Grid layout with responsive columns (2 on phone, 3 on tablet)"
        - "Tap item → item detail view"
        - "Long-press → multi-select mode"
        - "Filter by category, color, season"
        - "Sort by date added, color, category"
      quality:
        - "60fps scroll with 500+ items (virtualized list)"
        - "LQIP placeholder → full image < 300ms on 4G"
        - "Works offline (shows cached items)"
    depends_on: ["US-001"]
    priority: "critical"

  - id: "US-004"
    epic: "wardrobe_core"
    title: "Edit garment details"
    format: "As a user, I want to correct AI-generated tags on my garments so my wardrobe stays accurate"
    outcome: "correction rate < 30% (indicates AI accuracy) within 3 months"
    score:
      impact: 4
      confidence: 5
      effort: 2
      total: 10.0
      reasoning: "trust-builder, essential when AI is wrong"
    acceptance_criteria:
      functional:
        - "From item detail: edit category, color, season, tags"
        - "Add custom notes (e.g. 'wedding outfit')"
        - "Delete garment (with confirm)"
      quality:
        - "Changes sync across devices within 5s"
    depends_on: ["US-003"]
    priority: "high"

  # ─────────────────────────────────────────────────────────────
  # Epic 2: Scan — AI product identification
  # ─────────────────────────────────────────────────────────────
  - id: "US-010"
    epic: "scan"
    title: "Scan any photo to identify garments and find matching products"
    format: "As a user, I want to scan any photo (mine or from inspiration) so the app identifies the garments and shows me where to buy similar items"
    outcome: "scan feature used by 60%+ of MAU weekly; product tap-through rate ≥ 25%"
    score:
      impact: 5
      confidence: 3
      effort: 5
      total: 3.0
      reasoning: "highest impact AND highest risk — core differentiator. Confidence limited until feasibility spike completes"
    acceptance_criteria:
      functional:
        - "Scan button accessible from home, wardrobe, and any photo view"
        - "AI identifies distinct garments in the photo (top, bottom, shoes, accessories)"
        - "Visual overlay shows detected garments with subtle markers during analysis"
        - "For each detected garment, show 3-5 matching products with image, price, retailer, review score"
        - "Sort matches by price (ascending/descending)"
        - "Filter matches by retailer, price range"
        - "Tap a match → deep link to retailer (app or web)"
        - "Affiliate disclosure visible in results view"
      quality:
        - "Full scan (upload → first results visible) in < 6s on 4G"
        - "AI accuracy: top-3 results include a 'useful match' in ≥75% of scans (validated on test set)"
        - "Graceful 'no matches found' state with suggestion to try a clearer photo"
    definition_of_done:
      - "Feasibility spike passed (pre-requisite to committing)"
      - "Legal review of retailer API usage done"
      - "Affiliate networks integrated and disclosure UX approved"
    depends_on: []
    priority: "critical"

  - id: "US-011"
    epic: "scan"
    title: "Save scanned products to wishlist"
    format: "As a user, I want to save products from scan results so I can come back to them later"
    outcome: "wishlist adds per scan ≥ 0.5 (users find value worth saving)"
    score:
      impact: 3
      confidence: 4
      effort: 2
      total: 6.0
      reasoning: "retention driver, but secondary to scan itself working"
    depends_on: ["US-010"]
    priority: "high"

  # ─────────────────────────────────────────────────────────────
  # Epic 4: Profiles & Social (light — MVP)
  # ─────────────────────────────────────────────────────────────
  - id: "US-030"
    epic: "profiles"
    title: "Public user profile with wardrobe & looks"
    format: "As a user, I want my wardrobe and looks to be visible on a public profile so others can discover my style"
    outcome: "30%+ of sessions include a profile visit (own or other)"
    score:
      impact: 4
      confidence: 4
      effort: 3
      total: 6.7
      reasoning: "enables affiliate commission from anonymous visitors; unlocks social discovery loop"
    acceptance_criteria:
      functional:
        - "Public profile shows username, looks grid, and wardrobe items marked public"
        - "Items are private by default; user can toggle public per item or in bulk"
        - "Anonymous visitors can browse profile and tap affiliate product links"
        - "No account required to view a profile"
      quality:
        - "Profile loads in < 2s"
        - "Affiliate links accessible without login"
    depends_on: ["US-003", "US-021"]
    priority: "high"

  - id: "US-031"
    epic: "profiles"
    title: "Like a product from another user's profile → adds to wishlist"
    format: "As a logged-in user, I want to like a product I see on someone else's profile so it saves to my wishlist automatically"
    outcome: "wishlist adds via social ≥ 20% of total wishlist adds"
    score:
      impact: 4
      confidence: 4
      effort: 2
      total: 8.0
      reasoning: "social discovery → wishlist → purchase funnel; also drives affiliate commission"
    acceptance_criteria:
      functional:
        - "Like button on each product in a profile view"
        - "Like requires login — prompt to create account if anonymous"
        - "Liked product appears immediately in user's wishlist"
        - "Wishlist accessible from profile and main nav"
      quality:
        - "Optimistic UI — like registers instantly, syncs in background"
    depends_on: ["US-030", "US-011"]
    priority: "high"

  - id: "US-032"
    epic: "scan"
    title: "Scan inspiration photo (not owned) → adds to wishlist"
    format: "As a user, I want to scan a photo of something I don't own so the matching products go to my wishlist, not my wardrobe"
    outcome: "inspiration scans ≥ 30% of total scans"
    score:
      impact: 4
      confidence: 4
      effort: 2
      total: 8.0
      reasoning: "distinct intent from wardrobe scan; covers browsing/discovery use case"
    acceptance_criteria:
      functional:
        - "Scan flow asks intent before saving: 'Add to wardrobe' vs 'Save to wishlist'"
        - "Wishlist path: products from scan saved directly to wishlist"
        - "Wardrobe path: item added to personal wardrobe (existing US-010 flow)"
      quality:
        - "Intent choice is one tap — no extra screens"
    depends_on: ["US-010", "US-011"]
    priority: "high"

